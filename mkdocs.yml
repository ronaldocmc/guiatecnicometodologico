site_name: Guia Técnico-Metodológico para Propostas em Computação
site_description: Como formalizar, implementar, validar e documentar modelos, métodos,
  metodologias, arquiteturas, frameworks, plataformas, pipelines, agentes e artefatos
  computacionais.
site_author: Grupo de Pesquisa / UNESP
repo_name: guia-tecnico-metodologico
theme:
  name: material
  language: pt-BR
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.indexes
  - toc.follow
  - search.highlight
  - search.share
  - content.code.copy
  palette:
  - scheme: default
    primary: indigo
    accent: blue
  - scheme: slate
    primary: indigo
    accent: blue
    toggle:
      icon: material/weather-night
      name: Modo escuro
  font:
    text: Roboto
    code: Roboto Mono
markdown_extensions:
- admonition
- attr_list
- md_in_html
- tables
- footnotes
- toc
- pymdownx.details: {}
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: '!!python/name:pymdownx.superfences.fence_code_format'
- pymdownx.tabbed
- pymdownx.tasklist
- pymdownx.mark
- pymdownx.emoji
plugins:
- search
- awesome-pages
- git-revision-date-localized
nav:
- Início: index.md
- Como usar:
  - como-usar/index.md
  - como-usar/publicacao-github-pages.md
  - como-usar/roteiro-rapido.md
- Tipos de proposta:
